    <h2>Student Grade Processor</h2>

    <input type="number" id="gradeInput" placeholder="Enter grade" />
    <button onclick="addGrade()">Add Grade</button>
    <button onclick="showAll()">Show All</button>
    <button onclick="showPassing()">Show Passing</button>
    <button onclick="showAverage()">Show Average</button>
    <button onclick="showCurved()">Show Curved Grades</button>
    <button onclick="reset()">Reset</button>

    <ul id="output"></ul>

    <script>
      let grades = [];

      function addGrade() {
        let grade = document.getElementById("gradeInput");
        grades.push(Number(grade.value));
        grade.value = "";
      }
      function showAll() {
        let output = document.getElementById("output");
        output.innerHTML = "";
        grades.forEach((g) => {
          output.innerHTML += `<li> ${g} </li>`;
        });
      }
      function showPassing() {
        let output = document.getElementById("output");
        output.innerHTML = "";
        let passed = grades.filter((value) => value > 75);
        passed.forEach((g) => {
          output.innerHTML += `<li>${g}</li>`;
        });
      }
      let showAverage = () => {
        let output = document.getElementById("output");
        output.innerHTML = "";
        let total = grades.reduce((acc, curr) => acc + curr, 0);
        let average = total / grades.length;
        output.innerHTML = `The average is ${average.toFixed(2)}`;
      };
      let showCurved = () => {
        let output = document.getElementById("output");
        output.innerHTML = "";
        let curved = grades.map((value) => value * 1.1);
        curved.forEach((value) => {
          output.innerHTML = `${value}`;
        });
      };

      let reset = () => {
        grades = [];
        output.innerHTML = "";
      };
    </script>
