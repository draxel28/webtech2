    <!--Toggle effect changing the btn color and innerhtml-->
    <button
      id="result"
      style="
        background-color: red;
        color: white;
        min-width: 50px;
        border-radius: 4px;
      "
    >
      OFF
    </button>

    <script>
      let btn = document.getElementById("result");
      btn.addEventListener("click", () => {
        btn.innerHTML = btn.innerHTML === "OFF" ? "ON" : "OFF";

        btn.innerHTML === "OFF"
          ? (btn.style.backgroundColor = "Red")
          : btn.innerHTML === "ON"
            ? (btn.style.backgroundColor = "Blue")
            : (btn.style.backgroundColor = "Red");
      });
    </script>
  </body>
