    <label for="num1">Enter Num1: </label>
    <input type="number" id="num1" /> <br /><br />

    <input type="number" id="num2" /> <br /><br />

    <button id="add">+</button>

    <br />
    <br />

    <label for="">RESULT HERE</label>
    <textarea
      name="res"
      id="result"
      style="height: 100px; width: 100px"
    ></textarea>
    <button onclick="calculate()">Calculate</button>

    <script>
      let calculate = () => {
        let num1 = document.getElementById("num1").value;
        let num2 = document.getElementById("num2").value;
        let opp = document.getElementById("add").addEventListener();

        /* if (opp === "+") {
          document.getElementById("result").innerHTML = parseInt(num1 + num2);
        } else if (opp === "-") {

        } else if (opp === "/") {
          document.getElementById("result").innerHTML = parseInt(num1 / num2);
        } else if (opp === "*") {
          document.getElementById("result").innerHTML = parseInt(num1 * num2);
        } else {
          document.getElementById("result").innerHTML = "Invalid Operator";
        }
          */

        opp === "+"
          ? (document.getElementById("result").innerHTML = parseInt(
              num1 + num2
            ))
          : opp === "-"
            ? (document.getElementById("result").innerHTML = parseInt(
                num1 - num2
              ))
            : opp === "/"
              ? (document.getElementById("result").innerHTML = parseInt(
                  num1 / num2
                ))
              : opp === "*"
                ? (document.getElementById("result").innerHTML = parseInt(
                    num1 * num2
                  ))
                : (document.getElementById("result").innerHTML =
                    "Invalid Operator");
      };
    </script>
